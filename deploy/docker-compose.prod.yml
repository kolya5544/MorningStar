services:
  db:
    image: postgres:16-alpine
    container_name: morningstar-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  api:
    image: ${BACKEND_IMAGE}:${IMAGE_TAG}
    container_name: morningstar-api
    environment:
      SERVICE_NAME: morningstar-api
      SERVICE_VERSION: ${SERVICE_VERSION:-v0.1.0}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      OBJECT_STORAGE_SECRET: ${OBJECT_STORAGE_SECRET}
      OBJECT_STORAGE_ROOT: ${OBJECT_STORAGE_ROOT:-/data/object_storage}
      OBJECT_STORAGE_MAX_FILE_SIZE: ${OBJECT_STORAGE_MAX_FILE_SIZE:-5242880}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      PBKDF2_ITERS: ${PBKDF2_ITERS:-200000}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      BYBIT_TESTNET: ${BYBIT_TESTNET:-0}
      BYBIT_TIMEOUT_SEC: ${BYBIT_TIMEOUT_SEC:-8}
      BYBIT_RETRIES: ${BYBIT_RETRIES:-3}
      BYBIT_RETRY_DELAY_SEC: ${BYBIT_RETRY_DELAY_SEC:-0.6}
      BYBIT_RATE_LIMIT_COUNT: ${BYBIT_RATE_LIMIT_COUNT:-12}
      BYBIT_RATE_LIMIT_WINDOW_SEC: ${BYBIT_RATE_LIMIT_WINDOW_SEC:-1}
      BYBIT_TICKER_TTL_SEC: ${BYBIT_TICKER_TTL_SEC:-2}
      BYBIT_API_KEY: ${BYBIT_API_KEY:-}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      API_STARTUP_DB_RETRIES: ${API_STARTUP_DB_RETRIES:-20}
      API_STARTUP_DB_DELAY_SEC: ${API_STARTUP_DB_DELAY_SEC:-3}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - object_storage:/data/object_storage
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health/ | python -c \"import json,sys; data=json.load(sys.stdin); sys.exit(0 if data.get('status')=='ok' and data.get('dependencies',{}).get('database')=='ok' else 1)\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - backend
      - edge

  web:
    image: ${FRONTEND_IMAGE}:${IMAGE_TAG}
    container_name: morningstar-web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - edge

volumes:
  postgres_data:
  object_storage:

networks:
  backend:
    driver: bridge
    internal: true
  edge:
    driver: bridge

